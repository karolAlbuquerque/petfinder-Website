<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="PetFinder Logo">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF7043;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF5722;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pawGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFE0D6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="24" ry="24" fill="url(#bgGrad)"/>

  <!-- Paw print centered -->
  <!-- Main pad -->
  <ellipse cx="50" cy="62" rx="14" ry="12" fill="url(#pawGrad)" opacity="0.95"/>

  <!-- Top left toe -->
  <ellipse cx="31" cy="46" rx="7" ry="8.5" fill="url(#pawGrad)" opacity="0.95"/>
  <!-- Top center-left toe -->
  <ellipse cx="42" cy="39" rx="7" ry="8.5" fill="url(#pawGrad)" opacity="0.95"/>
  <!-- Top center-right toe -->
  <ellipse cx="58" cy="39" rx="7" ry="8.5" fill="url(#pawGrad)" opacity="0.95"/>
  <!-- Top right toe -->
  <ellipse cx="69" cy="46" rx="7" ry="8.5" fill="url(#pawGrad)" opacity="0.95"/>

  <!-- Small location pin overlay on main pad -->
  <path d="M50 56 C47 56 44.5 58.3 44.5 61.2 C44.5 65.2 50 71 50 71 C50 71 55.5 65.2 55.5 61.2 C55.5 58.3 53 56 50 56 Z" fill="#FF5722" opacity="0.6"/>
  <circle cx="50" cy="61.2" r="2.2" fill="white" opacity="0.9"/>
</svg>
